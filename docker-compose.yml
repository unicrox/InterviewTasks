services:
  model-api:
    build:
      context: .
      dockerfile: 1_1_predict_model/Dockerfile
    container_name: house-price-model-api
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: "1"
      MODEL_DATA_PATH: "/app/data/House Price Dataset.csv"
      MODEL_TEST_DATA_PATH: "/app/data/Test Data For Prediction.csv"
      MODEL_ARTIFACT_PATH: "/app/artifacts/ridge_model.joblib"
    volumes:
      - ./1_1_predict_model/model_api:/app/model_api
      - ./1_1_predict_model/artifacts:/app/artifacts
      - ./_requirements:/app/data:ro
    command:
      [
        "uvicorn",
        "model_api.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload"
      ]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\""
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
